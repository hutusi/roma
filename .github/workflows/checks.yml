# Cheap, fast gate: every PR and every push to main.
# The browser suite lives in e2e.yml (main pushes only, by decision —
# see docs/adr/0007; a red main E2E is handled fix-forward).
name: checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Biome (lint + format)
        run: bunx biome ci .

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test src

      - name: Portability guard (Cloudflare-exit constraints, ADR 0008)
        run: bun run check:portability

      - name: Migration drift check
        env:
          # drizzle.config.ts dereferences env at load; `generate` itself
          # never connects — it diffs schema against ./drizzle snapshots.
          DATABASE_URL: postgres://placeholder@localhost:5432/placeholder
        run: |
          bun run db:generate
          # A fresh migration is UNTRACKED, which `git diff` alone misses.
          git diff --exit-code -- drizzle/
          test -z "$(git status --porcelain -- drizzle/)"
